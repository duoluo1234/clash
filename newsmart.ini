### [custom] 规则标志位开始 ###
; 优先级：本地直连 > 屏蔽拦截 > AI服务 > 社交/通讯 > 影音媒体 > 办公/开发 > 游戏 > 国内分流 > 漏网之鱼
; 远程规则每 28800 秒（8 小时）自动更新一次

; 1. 全球直连与本地网络
ruleset=🎯 全球直连,[]GEOSITE,private
ruleset=🎯 全球直连,[]GEOIP,private,no-resolve

; 2. 广告拦截
ruleset=🚫 拦截广告,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Advertising/Advertising.yaml,28800

; 3. AI 矩阵 (远程加载，解决 Gemini/OpenAI 报错)
ruleset=🤖 ChatGPT,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.yaml,28800
ruleset=🤖 Claude,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.yaml,28800
ruleset=🤖 AI服务,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Gemini/Gemini.yaml,28800

; 4. 即时通讯与社交媒体
ruleset=💬 即时通讯,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram.yaml,28800
ruleset=🌐 社交媒体,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Twitter/Twitter.yaml,28800
ruleset=🌐 社交媒体,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Facebook/Facebook.yaml,28800

; 5. 影音娱乐
ruleset=📹 YouTube,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.yaml,28800
ruleset=🎥 Netflix,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix.yaml,28800
ruleset=🎥 DisneyPlus,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Disney/Disney.yaml,28800
ruleset=🎶 TikTok,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TikTok/TikTok.yaml,28800
ruleset=🎥 Emby,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Emby/Emby.yaml,28800
ruleset=🎻 Spotify,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Spotify/Spotify.yaml,28800

; 6. 办公、开发与搜索
ruleset=🚀 GitHub,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GitHub/GitHub.yaml,28800
ruleset=Ⓜ️ 微软服务,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Microsoft/Microsoft.yaml,28800
ruleset=🍎 苹果服务,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Apple/Apple.yaml,28800
ruleset=🇬 谷歌服务,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Google/Google.yaml,28800

; 7. 游戏与下载
ruleset=🎯 全球直连,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/SteamCN/SteamCN.yaml,28800
ruleset=🎮 Steam,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Steam/Steam.yaml,28800

; 8. 国内流量兜底 (基于本地数据库)
ruleset=🎯 全球直连,[]GEOSITE,cn
ruleset=🎯 全球直连,[]GEOIP,cn,no-resolve

; 9. 特殊端口与 PT (必须直连，防止封号)
ruleset=🎯 PT平台,clash-classic:https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/PrivateTracker/PrivateTracker.list,28800
ruleset=🔀 非标端口,clash-classic:https://testingcf.jsdelivr.net/gh/Aethersailor/Custom_OpenClash_Rules@main/rule/Custom_Port_Direct.yaml,28800

; 10. 漏网之鱼
ruleset=🐟 漏网之鱼,[]FINAL

### [custom] 规则标志位结束 ###


### [proxy_group] 节点分组开始 ###

; --- 核心策略组 (开启 Smart 内核特性) ---
custom_proxy_group=🚀 手动选择`select`.*
custom_proxy_group=♻️ 自动智能`url-test`.*`https://www.gstatic.com/generate_204`300,,10`uselightgbm=true`sticky-sessions=true

; --- AI 阵列 (建议锁定高质量节点) ---
custom_proxy_group=🤖 ChatGPT`select`[]🚀 手动选择`[]♻️ 自动智能`.*
custom_proxy_group=🤖 Claude`select`[]🚀 手动选择`[]♻️ 自动智能`.*
custom_proxy_group=🤖 AI服务`select`[]🚀 手动选择`[]♻️ 自动智能`.*

; --- 社交与通讯 (启用容灾 Fallback) ---
custom_proxy_group=💬 即时通讯`fallback`[]🚀 手动选择`[]♻️ 自动智能`.*`https://www.gstatic.com/generate_204`300
custom_proxy_group=🌐 社交媒体`select`[]🚀 手动选择`[]♻️ 自动智能`.*

; --- 影音媒体 ---
custom_proxy_group=📹 YouTube`url-test`[]🚀 手动选择`.*`https://www.google.com/generate_204`300
custom_proxy_group=🎥 Netflix`select`[]🚀 手动选择`[]♻️ 自动智能`.*
custom_proxy_group=🎥 DisneyPlus`select`[]🚀 手动选择`[]♻️ 自动智能`.*
custom_proxy_group=🎶 TikTok`select`[]🚀 手动选择`[]♻️ 自动智能`[]🎯 全球直连
custom_proxy_group=🎥 Emby`select`[]🚀 手动选择`[]🎯 全球直连`.*
custom_proxy_group=🎻 Spotify`select`[]🚀 手动选择`[]♻️ 自动智能`[]🎯 全球直连

; --- 开发与系统服务 ---
custom_proxy_group=🚀 GitHub`select`[]🚀 手动选择`[]♻️ 自动智能`[]🎯 全球直连
custom_proxy_group=🍎 苹果服务`select`[]🎯 全球直连`[]🚀 手动选择`[]♻️ 自动智能
custom_proxy_group=Ⓜ️ 微软服务`select`[]🎯 全球直连`[]🚀 手动选择`[]♻️ 自动智能
custom_proxy_group=🎮 Steam`select`[]🎯 全球直连`[]🚀 手动选择`[]♻️ 自动智能

; --- 基础与兜底 ---
custom_proxy_group=🎯 全球直连`select`[]DIRECT`[]🚀 手动选择`.*
custom_proxy_group=🐟 漏网之鱼`select`[]🚀 手动选择`[]🎯 全球直连`[]♻️ 自动智能
custom_proxy_group=🔀 非标端口`select`[]DIRECT`[]🎯 全球直连
custom_proxy_group=🚫 拦截广告`select`[]REJECT`[]DIRECT

### [proxy_group] 节点分组结束 ###

enable_rule_generator=true
overwrite_original_rules=true
