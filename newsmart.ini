; ============================================
; newsmart.ini - 完整版
; 合并 smart.ini GEOSITE 规则 + 完整 [general]/[template]/[rule-provider]
; ============================================

[template]
no-resolve = true

[general]
loglevel = warning
redir-port = 7892
tproxy-port = 7895
mixed-port = 7893
socks-port = 7891
http-port = 7890
allow-lan = true
bind-address = "*"
mode = rule
ipv6 = false
external-controller = 0.0.0.0:9090
external-ui = dashboard

dns:
  enable = true
  ipv6 = false
  enhanced-mode = fake-ip
  fake-ip-range = 198.18.0.1/16
  nameserver = ['223.5.5.5', '119.29.29.29']
  fallback = ['1.1.1.1', '8.8.8.8']
  fallback-filter = { geoip = true, geoip-code = 'CN' }

[rule-provider]
; === Loyalsoldier 规则集 (每日更新) ===
reject:
  type = http
  behavior = domain
  url = "https://github.com/Loyalsoldier/clash-rules/releases/latest/download/reject.txt"
  path = "./rule_provider/loyalsoldier_reject.yaml"
  interval = 86400

